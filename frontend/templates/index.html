<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票量化回测系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📈</text></svg>" type="image/svg+xml">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container-fluid p-0">
        {% include 'navbar.html' %}

        <div class="content pt-4">
            <div class="page-header mb-4">
                <div>
                    <h1 class="page-title"><i class="fas fa-chart-line"></i>股票量化回测系统</h1>
                    <p class="page-subtitle">数据获取、回测分析、信号检测，一站式量化投资研究平台</p>
                </div>
            </div>

            <div class="row g-4">
                <div class="col-lg-6">
                    <div class="card form-panel" id="data-acquisition">
                        <div class="form-panel-header">
                            <h5><i class="fas fa-database"></i>数据获取</h5>
                        </div>
                        <div class="form-panel-body">
                            <form id="dataAcquisitionForm">
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label for="dataSourceAcquire" class="form-label">数据源</label>
                                        <select class="form-select" id="dataSourceAcquire" name="dataSourceAcquire" required>
                                            <option value="">请选择数据源</option>
                                            <option value="akshare">akshare</option>
                                            <option value="baostock">baostock</option>
                                            <option value="futu">futu</option>
                                        </select>
                                    </div>
                                    <div class="col-md-6">
                                        <label for="market" class="form-label">市场</label>
                                        <select class="form-select" id="market" name="market" required>
                                            <option value="">请选择市场</option>
                                            <option value="hk">港股</option>
                                            <option value="us">美股</option>
                                            <option value="cn">A股</option>
                                        </select>
                                    </div>
                                    <div class="col-md-6">
                                        <label for="stockCode" class="form-label">股票代码</label>
                                        <input type="text" class="form-control" id="stockCode" name="stockCode" placeholder="HK.00700, US.IVV, SH.600519" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label for="adjustType" class="form-label">复权类型</label>
                                        <select class="form-select" id="adjustType" name="adjustType">
                                            <option value="qfq">前复权</option>
                                            <option value="hfq">后复权</option>
                                            <option value="bfq">不复权</option>
                                        </select>
                                    </div>
                                    <div class="col-md-6">
                                        <label for="startDate" class="form-label">开始日期</label>
                                        <input type="date" class="form-control" id="startDate" name="startDate" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label for="endDate" class="form-label">结束日期</label>
                                        <input type="date" class="form-control" id="endDate" name="endDate" required>
                                    </div>
                                    <div class="col-12">
                                        <button type="submit" class="btn btn-primary w-100">
                                            <i class="fas fa-download me-2"></i>获取数据
                                        </button>
                                    </div>
                                </div>
                            </form>
                        </div>
                        <div class="card-footer" id="dataAcquisitionResult" style="display: none;">
                            <div id="acquisitionMessage"></div>
                        </div>
                    </div>
                </div>

                <div class="col-lg-6">
                    <div class="card form-panel" id="backtest">
                        <div class="form-panel-header">
                            <h5><i class="fas fa-robot"></i>回测配置</h5>
                        </div>
                        <div class="form-panel-body">
                            <form id="backtestForm">
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label for="dataSource" class="form-label">数据源</label>
                                        <select class="form-select" id="dataSource" name="dataSource" required>
                                            <option value="">请选择数据源</option>
                                            {% for source in data_sources %}
                                            <option value="{{ source }}">{{ source }}</option>
                                            {% endfor %}
                                        </select>
                                    </div>
                                    <div class="col-md-6">
                                        <label for="stockFile" class="form-label">股票</label>
                                        <select class="form-select" id="stockFile" name="stockFile"></select>
                                    </div>
                                    <div class="col-md-6">
                                        <label for="strategy" class="form-label">策略选择</label>
                                        <select class="form-select" id="strategy" name="strategy" required>
                                            {% for strategy_name in strategies %}
                                            <option value="{{ strategy_name }}">{{ strategy_name }}</option>
                                            {% endfor %}
                                        </select>
                                    </div>
                                    <div class="col-md-6">
                                        <label for="initCash" class="form-label">初始资金</label>
                                        <input type="number" class="form-control" id="initCash" name="initCash" value="5000000" min="10000" step="10000">
                                    </div>
                                    <div class="col-12">
                                        <div class="form-check form-check-inline">
                                            <input class="form-check-input" type="radio" name="backtestType" id="singleTest" value="single" checked>
                                            <label class="form-check-label" for="singleTest"><i class="fas fa-star me-1"></i>单个股票</label>
                                        </div>
                                        <div class="form-check form-check-inline">
                                            <input class="form-check-input" type="radio" name="backtestType" id="batchTest" value="batch">
                                            <label class="form-check-label" for="batchTest"><i class="fas fa-layer-group me-1"></i>批量回测</label>
                                        </div>
                                    </div>
                                    <div class="col-12">
                                        <button type="submit" class="btn btn-primary w-100">
                                            <i class="fas fa-play me-2"></i>开始回测
                                        </button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card mt-4 result-card" id="resultCard" style="display: none;">
                <div class="result-card-header">
                    <h5><i class="fas fa-check-circle"></i>回测结果</h5>
                </div>
                <div class="card-body">
                    <div id="resultMessage"></div>
                    <div id="resultView" class="mt-4"></div>
                </div>
            </div>

            <div class="card mt-4 form-panel" id="results">
                <div class="form-panel-header">
                    <h5><i class="fas fa-history"></i>历史回测结果</h5>
                    <span class="badge badge-info" id="resultCount">0 条记录</span>
                </div>
                <div class="form-panel-body">
                    <div class="filter-section">
                        <div class="filter-row">
                            <div class="filter-group">
                                <label><i class="fas fa-search me-1"></i>股票筛选</label>
                                <input type="text" class="form-control" id="stockFilter" placeholder="输入股票名称">
                            </div>
                            <div class="filter-group">
                                <label><i class="fas fa-database me-1"></i>数据源</label>
                                <select class="form-select" id="sourceFilter">
                                    <option value="">全部数据源</option>
                                    {% for source in data_sources %}
                                    <option value="{{ source }}">{{ source }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="filter-group">
                                <label><i class="fas fa-calendar me-1"></i>运行日期</label>
                                <input type="date" class="form-control" id="dateFilter">
                            </div>
                            <div class="filter-group">
                                <label><i class="fas fa-brain me-1"></i>策略</label>
                                <select class="form-select" id="strategyFilter">
                                    <option value="">全部策略</option>
                                    {% for strategy_name in strategies %}
                                    <option value="{{ strategy_name }}">{{ strategy_name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="filter-actions">
                                <button class="btn btn-primary" onclick="loadResults(1)"><i class="fas fa-filter me-1"></i>筛选</button>
                                <button class="btn btn-secondary" onclick="resetFilters()"><i class="fas fa-undo me-1"></i>重置</button>
                            </div>
                        </div>
                    </div>

                    <div class="data-table-wrapper">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>序号</th>
                                    <th>股票</th>
                                    <th>数据源</th>
                                    <th>策略</th>
                                    <th>运行时间</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="resultsTable"></tbody>
                        </table>
                    </div>

                    <div id="noResults" class="empty-state d-none">
                        <div class="empty-state-icon"><i class="fas fa-folder-open"></i></div>
                        <div class="empty-state-title">暂无历史记录</div>
                        <div class="empty-state-text">运行一次回测后，结果将显示在这里</div>
                    </div>

                    <div class="modern-pagination" id="paginationContainer">
                        <div class="pagination-info">
                            共 <span id="totalResults" class="fw-bold">0</span> 条记录
                        </div>
                        <div class="pagination-controls">
                            <button class="page-btn nav-btn" id="prevPage" onclick="loadResults(currentPage - 1)">
                                <i class="fas fa-chevron-left"></i>
                            </button>
                            <div id="pagination"></div>
                            <button class="page-btn nav-btn" id="nextPage" onclick="loadResults(currentPage + 1)">
                                <i class="fas fa-chevron-right"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentPage = 1;
        let stocks = [];

        document.addEventListener('DOMContentLoaded', function() {
            const today = new Date();
            const fourYearsAgo = new Date();
            fourYearsAgo.setFullYear(today.getFullYear() - 4);

            const formatDate = (date) => {
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            };

            document.getElementById('startDate').value = formatDate(fourYearsAgo);
            document.getElementById('endDate').value = formatDate(today);
            document.getElementById('endDate').max = formatDate(today);

            document.getElementById('startDate').addEventListener('change', function() {
                const startDate = new Date(this.value);
                const maxEndDate = new Date(startDate);
                maxEndDate.setFullYear(startDate.getFullYear() + 4);
                document.getElementById('endDate').max = formatDate(maxEndDate);

                const currentEndDate = new Date(document.getElementById('endDate').value);
                if (currentEndDate > maxEndDate) {
                    document.getElementById('endDate').value = formatDate(maxEndDate);
                }
            });

            document.getElementById('endDate').addEventListener('change', function() {
                const endDate = new Date(this.value);
                const minStartDate = new Date(endDate);
                minStartDate.setFullYear(endDate.getFullYear() - 4);
                document.getElementById('startDate').min = formatDate(minStartDate);

                const currentStartDate = new Date(document.getElementById('startDate').value);
                if (currentStartDate < minStartDate) {
                    document.getElementById('startDate').value = formatDate(minStartDate);
                }
            });
        });

        document.getElementById('dataSourceAcquire').addEventListener('change', function() {
            const dataSource = this.value;
            const marketSelect = document.getElementById('market');
            marketSelect.innerHTML = '<option value="">请选择市场</option>';

            if (dataSource === 'futu') {
                marketSelect.add(new Option('港股', 'hk'));
                marketSelect.add(new Option('A股', 'cn'));
            } else if (dataSource === 'baostock') {
                marketSelect.add(new Option('A股', 'cn'));
            } else if (dataSource === 'akshare') {
                marketSelect.add(new Option('港股', 'hk'));
                marketSelect.add(new Option('美股', 'us'));
                marketSelect.add(new Option('A股', 'cn'));
            }
        });

        document.getElementById('dataAcquisitionForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const resultFooter = document.getElementById('dataAcquisitionResult');
            const messageDiv = document.getElementById('acquisitionMessage');

            resultFooter.style.display = 'block';
            messageDiv.innerHTML = '<div class="alert alert-info"><i class="fas fa-spinner fa-spin me-2"></i>正在获取数据，请稍候...</div>';

            fetch('/acquire_stock_data', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    market: document.getElementById('market').value,
                    data_source: document.getElementById('dataSourceAcquire').value,
                    stock_code: document.getElementById('stockCode').value,
                    start_date: document.getElementById('startDate').value,
                    end_date: document.getElementById('endDate').value,
                    adjust_type: document.getElementById('adjustType').value
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    messageDiv.innerHTML = `<div class="alert alert-success"><i class="fas fa-check-circle me-2"></i>${data.message}</div>`;
                } else {
                    messageDiv.innerHTML = `<div class="alert alert-danger"><i class="fas fa-times-circle me-2"></i>${data.message}</div>`;
                }
            })
            .catch(error => {
                messageDiv.innerHTML = `<div class="alert alert-danger"><i class="fas fa-exclamation-triangle me-2"></i>获取数据失败</div>`;
            });
        });

        document.getElementById('dataSource').addEventListener('change', function() {
            const source = this.value;
            const stockSelect = document.getElementById('stockFile');

            if (source) {
                fetch(`/get_stocks/${source}`)
                    .then(response => response.json())
                    .then(data => {
                        stocks = data.data.stocks;
                        stockSelect.innerHTML = '';
                        stocks.forEach(stock => {
                            const option = document.createElement('option');
                            option.value = stock.file;
                            option.textContent = stock.file.replace('.csv', '');
                            stockSelect.appendChild(option);
                        });
                        updateStockSelectState();
                    })
                    .catch(error => console.error('Error:', error));
            } else {
                stockSelect.innerHTML = '';
            }
        });

        document.querySelectorAll('input[name="backtestType"]').forEach(radio => {
            radio.addEventListener('change', updateStockSelectState);
        });

        function updateStockSelectState() {
            const isBatch = document.getElementById('batchTest').checked;
            document.getElementById('stockFile').disabled = isBatch;
        }

        document.getElementById('backtestForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const resultCard = document.getElementById('resultCard');
            const resultMessage = document.getElementById('resultMessage');
            const resultView = document.getElementById('resultView');

            resultCard.style.display = 'block';
            resultMessage.innerHTML = '<div class="alert alert-info"><i class="fas fa-spinner fa-spin me-2"></i>回测正在进行中，请稍候...</div>';
            resultView.innerHTML = '';

            fetch('/run_backtest', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    source: document.getElementById('dataSource').value,
                    stock_file: document.getElementById('stockFile').value,
                    is_batch: document.getElementById('batchTest').checked,
                    init_cash: document.getElementById('initCash').value,
                    strategy: document.getElementById('strategy').value
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    resultMessage.innerHTML = `<div class="alert alert-success"><i class="fas fa-check-circle me-2"></i>${data.message}</div>`;
                    if (!document.getElementById('batchTest').checked && data.data.result_path) {
                        resultView.innerHTML = `
                            <a href="/show_result/${data.data.result_path}" target="_blank" class="btn btn-primary">
                                <i class="fas fa-chart-line me-2"></i>查看回测结果
                            </a>
                        `;
                    }
                    loadResults(1);
                } else {
                    resultMessage.innerHTML = `<div class="alert alert-danger"><i class="fas fa-times-circle me-2"></i>${data.message}</div>`;
                }
            })
            .catch(error => {
                resultMessage.innerHTML = `<div class="alert alert-danger"><i class="fas fa-exclamation-triangle me-2"></i>回测失败</div>`;
            });
        });

        function loadResults(page = 1) {
            const stockFilter = document.getElementById('stockFilter').value;
            const sourceFilter = document.getElementById('sourceFilter').value;
            const dateFilter = document.getElementById('dateFilter').value;
            const strategyFilter = document.getElementById('strategyFilter').value;
            const pageSize = document.getElementById('pageSize')?.value || 20;

            const params = new URLSearchParams();
            params.append('page', page);
            params.append('page_size', pageSize);
            if (stockFilter) params.append('stock', stockFilter);
            if (sourceFilter) params.append('source', sourceFilter);
            if (dateFilter) params.append('date', dateFilter);
            if (strategyFilter) params.append('strategy', strategyFilter);

            fetch(`/get_backtest_results?${params.toString()}`)
                .then(response => response.json())
                .then(data => {
                    if (!data.success) {
                        console.error('Error:', data.message);
                        return;
                    }

                    currentPage = page;
                    const resultsTable = document.getElementById('resultsTable');
                    const noResults = document.getElementById('noResults');
                    const paginationContainer = document.getElementById('paginationContainer');
                    const resultCount = document.getElementById('resultCount');

                    resultsTable.innerHTML = '';

                    if (data.data.results.length > 0) {
                        noResults.classList.add('d-none');
                        resultCount.textContent = `${data.data.total} 条记录`;

                        data.data.results.forEach((result, index) => {
                            const row = document.createElement('tr');
                            const serialNumber = (page - 1) * pageSize + index + 1;
                            row.innerHTML = `
                                <td class="text-secondary">#${serialNumber}</td>
                                <td><strong>${result.stock}</strong></td>
                                <td><span class="badge badge-info">${result.source}</span></td>
                                <td>${result.strategy ? `<a href="/strategy_code?strategy=${encodeURIComponent(result.strategy)}" target="_blank" class="text-primary">${result.strategy}</a>` : '-'}</td>
                                <td class="text-secondary">${result.run_time}</td>
                                <td>
                                    <a href="/show_result/${result.path}" target="_blank" class="action-btn edit">
                                        <i class="fas fa-chart-line"></i> 查看
                                    </a>
                                </td>
                            `;
                            resultsTable.appendChild(row);
                        });

                        document.getElementById('totalResults').textContent = data.data.total;
                        renderPagination(page, data.data.total_pages);
                        paginationContainer.style.display = 'flex';
                    } else {
                        noResults.classList.remove('d-none');
                        paginationContainer.style.display = 'none';
                        document.getElementById('totalResults').textContent = '0';
                        resultCount.textContent = '0 条记录';
                    }
                })
                .catch(error => console.error('Error:', error));
        }

        function renderPagination(page, totalPages) {
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = '';

            document.getElementById('prevPage').className = `page-btn nav-btn ${page === 1 ? 'disabled' : ''}`;
            document.getElementById('nextPage').className = `page-btn nav-btn ${page === totalPages ? 'disabled' : ''}`;

            const maxButtons = 5;
            let startPage = Math.max(1, page - Math.floor(maxButtons / 2));
            let endPage = Math.min(totalPages, startPage + maxButtons - 1);

            if (endPage - startPage + 1 < maxButtons) {
                startPage = Math.max(1, endPage - maxButtons + 1);
            }

            for (let i = startPage; i <= endPage; i++) {
                const pageItem = document.createElement('button');
                pageItem.className = `page-btn ${i === page ? 'active' : ''}`;
                pageItem.textContent = i;
                pageItem.addEventListener('click', () => loadResults(i));
                pagination.appendChild(pageItem);
            }
        }

        function resetFilters() {
            document.getElementById('stockFilter').value = '';
            document.getElementById('sourceFilter').value = '';
            document.getElementById('dateFilter').value = '';
            document.getElementById('strategyFilter').value = '';
            loadResults(1);
        }

        document.getElementById('pageSize')?.addEventListener('change', () => loadResults(1));

        window.addEventListener('load', () => loadResults(1));
    </script>
</body>
</html>
