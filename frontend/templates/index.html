<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票量化回测系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📈</text></svg>" type="image/svg+xml">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container-fluid p-0">
        {% include 'navbar.html' %}

        <div class="content pt-4">
            <div class="hero-section">
                <div class="row align-items-center">
                    <div class="col-lg-8">
                        <h1 class="hero-title"><i class="fas fa-chart-line me-3"></i>股票量化回测系统</h1>
                        <p class="hero-subtitle">数据获取、回测分析、信号检测，一站式量化投资研究平台</p>
                    </div>
                </div>
            </div>

            <div class="action-cards">
                <div class="action-card" id="data-acquisition">
                    <div class="action-card-header">
                        <div class="action-card-icon data"><i class="fas fa-database"></i></div>
                        <div>
                            <h5 class="action-card-title">数据获取</h5>
                            <p class="action-card-subtitle">获取股票历史行情数据</p>
                        </div>
                    </div>
                    <div class="action-card-body">
                        <form id="dataAcquisitionForm">
                            <div class="form-grid">
                                <div class="modern-form-group">
                                    <label class="modern-label"><i class="fas fa-server"></i>数据源</label>
                                    <select class="modern-select" id="dataSourceAcquire" required>
                                        <option value="">请选择</option>
                                        <option value="akshare">akshare</option>
                                        <option value="baostock">baostock</option>
                                        <option value="futu">futu</option>
                                    </select>
                                </div>
                                <div class="modern-form-group">
                                    <label class="modern-label"><i class="fas fa-globe"></i>市场</label>
                                    <select class="modern-select" id="market" required>
                                        <option value="">请选择</option>
                                    </select>
                                </div>
                                <div class="modern-form-group">
                                    <label class="modern-label"><i class="fas fa-code"></i>股票代码</label>
                                    <input type="text" class="modern-input" id="stockCode" placeholder="HK.00700, US.IVV" required>
                                </div>
                                <div class="modern-form-group">
                                    <label class="modern-label"><i class="fas fa-adjust"></i>复权类型</label>
                                    <select class="modern-select" id="adjustType">
                                        <option value="qfq">前复权</option>
                                        <option value="hfq">后复权</option>
                                        <option value="bfq">不复权</option>
                                    </select>
                                </div>
                                <div class="modern-form-group">
                                    <label class="modern-label"><i class="fas fa-calendar"></i>开始日期</label>
                                    <input type="date" class="modern-input" id="startDate" required>
                                </div>
                                <div class="modern-form-group">
                                    <label class="modern-label"><i class="fas fa-calendar"></i>结束日期</label>
                                    <input type="date" class="modern-input" id="endDate" required>
                                </div>
                                <div class="modern-form-group col-span-2">
                                    <button type="submit" class="modern-btn modern-btn-primary">
                                        <i class="fas fa-download"></i>获取数据
                                    </button>
                                </div>
                            </div>
                        </form>
                        <div id="dataAcquisitionResult" class="mt-3"></div>
                    </div>
                </div>

                <div class="action-card" id="backtest">
                    <div class="action-card-header">
                        <div class="action-card-icon backtest"><i class="fas fa-robot"></i></div>
                        <div>
                            <h5 class="action-card-title">回测配置</h5>
                            <p class="action-card-subtitle">运行策略回测分析</p>
                        </div>
                    </div>
                    <div class="action-card-body">
                        <form id="backtestForm">
                            <div class="form-grid">
                                <div class="modern-form-group">
                                    <label class="modern-label"><i class="fas fa-server"></i>数据源</label>
                                    <select class="modern-select" id="dataSource" required>
                                        <option value="">请选择</option>
                                        {% for source in data_sources %}
                                        <option value="{{ source }}">{{ source }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                                <div class="modern-form-group">
                                    <label class="modern-label"><i class="fas fa-file-alt"></i>股票</label>
                                    <div class="search-select" id="stockSelectWrapper">
                                        <input type="text" class="modern-input" id="stockSearch" placeholder="搜索股票..." autocomplete="off">
                                        <input type="hidden" id="stockFile">
                                        <div class="search-dropdown" id="stockDropdown">
                                            <div class="search-options" id="stockOptions"></div>
                                        </div>
                                    </div>
                                </div>
                                <div class="modern-form-group">
                                    <label class="modern-label"><i class="fas fa-brain"></i>策略</label>
                                    <select class="modern-select" id="strategy" required>
                                        {% for strategy_name in strategies %}
                                        <option value="{{ strategy_name }}">{{ strategy_name }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                                <div class="modern-form-group">
                                    <label class="modern-label"><i class="fas fa-coins"></i>初始资金</label>
                                    <input type="number" class="modern-input" id="initCash" value="5000000" min="10000" step="10000">
                                </div>
                                <div class="modern-form-group col-span-2">
                                    <label class="modern-label"><i class="fas fa-cog"></i>回测模式</label>
                                    <div class="radio-group mt-2">
                                        <div class="radio-item">
                                            <input type="radio" name="backtestType" id="singleTest" value="single" checked>
                                            <label for="singleTest"><i class="fas fa-star me-1"></i>单个股票</label>
                                        </div>
                                        <div class="radio-item">
                                            <input type="radio" name="backtestType" id="batchTest" value="batch">
                                            <label for="batchTest"><i class="fas fa-layer-group me-1"></i>批量回测</label>
                                        </div>
                                    </div>
                                </div>
                                <div class="modern-form-group col-span-2">
                                    <button type="submit" class="modern-btn modern-btn-primary">
                                        <i class="fas fa-play"></i>开始回测
                                    </button>
                                </div>
                            </div>
                        </form>
                        <div id="resultMessage" class="mt-3"></div>
                        <div id="resultView" class="mt-3"></div>
                        <div class="result-message info mt-3" style="font-size: 12px;">
                            <i class="fas fa-info-circle"></i>
                            <span>更多配置（费率、滑点等）请在 settings 文件中配置，暂不支持单独配置</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="table-container" id="results">
                <div class="table-header-custom">
                    <div class="table-title">
                        <i class="fas fa-history"></i>
                        历史回测结果
                    </div>
                </div>

                <div class="filter-bar-custom">
                    <div class="filter-bar-row">
                        <div class="filter-item-custom">
                            <label><i class="fas fa-search"></i></label>
                            <input type="text" class="filter-input" id="stockFilter" placeholder="股票名称" oninput="debounceFilter()">
                        </div>
                        <div class="filter-item-custom">
                            <label><i class="fas fa-database"></i></label>
                            <select class="filter-select" id="sourceFilter">
                                <option value="">数据源</option>
                                {% for source in data_sources %}
                                <option value="{{ source }}">{{ source }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="filter-item-custom">
                            <label><i class="fas fa-brain"></i></label>
                            <select class="filter-select" id="strategyFilter">
                                <option value="">策略</option>
                                {% for strategy_name in strategies %}
                                <option value="{{ strategy_name }}">{{ strategy_name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="filter-item-custom date-range">
                            <label><i class="fas fa-calendar"></i></label>
                            <input type="date" class="filter-input" id="dateFilterStart" placeholder="开始日期">
                            <span class="date-separator">至</span>
                            <input type="date" class="filter-input" id="dateFilterEnd" placeholder="结束日期">
                        </div>
                        <button class="filter-btn" onclick="applyFilters()">
                            <i class="fas fa-search"></i> 搜索
                        </button>
                        <button class="filter-btn reset" onclick="resetFilters()">
                            <i class="fas fa-undo"></i> 重置
                        </button>
                    </div>
                </div>

                <div class="stats-row">
                    <div class="mini-stat">
                        <div class="mini-stat-icon blue"><i class="fas fa-database"></i></div>
                        <div>
                            <div class="mini-stat-value">3</div>
                            <div class="mini-stat-label">数据源</div>
                        </div>
                    </div>
                    <div class="mini-stat">
                        <div class="mini-stat-icon green"><i class="fas fa-brain"></i></div>
                        <div>
                            <div class="mini-stat-value" id="strategyCount">-</div>
                            <div class="mini-stat-label">交易策略</div>
                        </div>
                    </div>
                    <div class="mini-stat">
                        <div class="mini-stat-icon orange"><i class="fas fa-chart-bar"></i></div>
                        <div>
                            <div class="mini-stat-value" id="resultCountValue">-</div>
                            <div class="mini-stat-label">回测结果</div>
                        </div>
                    </div>
                    <div class="mini-stat">
                        <div class="mini-stat-icon purple"><i class="fas fa-clock"></i></div>
                        <div>
                            <div class="mini-stat-value">4年</div>
                            <div class="mini-stat-label">历史数据</div>
                        </div>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="data-table-custom">
                        <thead>
                            <tr>
                                <th><i class="fas fa-hashtag me-1"></i>序号</th>
                                <th><i class="fas fa-chart-bar me-1"></i>股票</th>
                                <th><i class="fas fa-database me-1"></i>数据源</th>
                                <th><i class="fas fa-brain me-1"></i>策略</th>
                                <th><i class="fas fa-clock me-1"></i>运行时间</th>
                                <th><i class="fas fa-cog me-1"></i>操作</th>
                            </tr>
                        </thead>
                        <tbody id="resultsTable"></tbody>
                    </table>
                </div>

                <div id="noResults" class="empty-state-custom d-none">
                    <div class="empty-icon"><i class="fas fa-folder-open"></i></div>
                    <div class="empty-title">暂无历史记录</div>
                    <div class="empty-text">运行一次回测后，结果将显示在这里</div>
                </div>

                <div class="pagination-custom" id="paginationContainer">
                    <div class="pagination-info-custom">
                        共 <strong id="totalResults">0</strong> 条记录
                    </div>
                    <div class="pagination-controls-custom">
                        <button class="page-btn-custom" id="prevPage" onclick="goToPage(currentPage - 1)">
                            <i class="fas fa-chevron-left"></i>
                        </button>
                        <div id="pagination"></div>
                        <button class="page-btn-custom" id="nextPage" onclick="goToPage(currentPage + 1)">
                            <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="notification" class="notification"></div>

    <script>
        let currentPage = 1;
        const pageSize = 10;

        function scrollToSection(sectionId) {
            const section = document.getElementById(sectionId);
            if (section) {
                const offset = 80;
                const elementPosition = section.getBoundingClientRect().top;
                const offsetPosition = elementPosition + window.pageYOffset - offset;

                window.scrollTo({
                    top: offsetPosition,
                    behavior: 'smooth'
                });

                setTimeout(() => {
                    section.classList.remove('section-highlight');
                    void section.offsetWidth;
                    section.classList.add('section-highlight');
                }, 300);
            }
        }

        function updateNavActiveState(hash) {
            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.remove('active');
            });

            const targetId = hash.replace('#', '') || 'data-acquisition';
            const activeLink = document.querySelector(`.nav-link[href="#${targetId}"]`);
            if (activeLink) {
                activeLink.classList.add('active');
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            const today = new Date();
            const fourYearsAgo = new Date();
            fourYearsAgo.setFullYear(today.getFullYear() - 4);

            const formatDate = (date) => {
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            };

            document.getElementById('startDate').value = formatDate(fourYearsAgo);
            document.getElementById('endDate').value = formatDate(today);
            document.getElementById('endDate').max = formatDate(today);

            document.getElementById('strategyCount').textContent = {{ strategies|length }};

            loadResults(1);

            const hash = window.location.hash;
            if (hash) {
                updateNavActiveState(hash);
                setTimeout(() => scrollToSection(hash.replace('#', '')), 100);
            }
        });

        document.querySelectorAll('.nav-link[href^="#"]').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                const hash = this.getAttribute('href').replace('#', '');
                window.history.pushState(null, '', '#' + hash);
                updateNavActiveState(hash);
                scrollToSection(hash);
            });
        });

        window.addEventListener('hashchange', function() {
            const hash = window.location.hash.replace('#', '');
            if (hash) {
                updateNavActiveState(hash);
                scrollToSection(hash);
            }
        });

        document.getElementById('dataSourceAcquire').addEventListener('change', function() {
            const dataSource = this.value;
            const marketSelect = document.getElementById('market');
            marketSelect.innerHTML = '<option value="">请选择</option>';

            if (dataSource === 'futu') {
                marketSelect.add(new Option('港股', 'hk'));
                marketSelect.add(new Option('A股', 'cn'));
            } else if (dataSource === 'baostock') {
                marketSelect.add(new Option('A股', 'cn'));
            } else if (dataSource === 'akshare') {
                marketSelect.add(new Option('港股', 'hk'));
                marketSelect.add(new Option('美股', 'us'));
                marketSelect.add(new Option('A股', 'cn'));
            }
        });

        document.getElementById('dataAcquisitionForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const resultDiv = document.getElementById('dataAcquisitionResult');
            resultDiv.innerHTML = `
                <div class="result-message info">
                    <i class="fas fa-spinner fa-spin"></i>
                    <span>正在获取数据，请稍候...</span>
                </div>
            `;

            fetch('/acquire_stock_data', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    market: document.getElementById('market').value,
                    data_source: document.getElementById('dataSourceAcquire').value,
                    stock_code: document.getElementById('stockCode').value,
                    start_date: document.getElementById('startDate').value,
                    end_date: document.getElementById('endDate').value,
                    adjust_type: document.getElementById('adjustType').value
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    resultDiv.innerHTML = `
                        <div class="result-message success">
                            <i class="fas fa-check-circle"></i>
                            <span>${data.message}</span>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="result-message error">
                            <i class="fas fa-times-circle"></i>
                            <span>${data.message}</span>
                        </div>
                    `;
                }
            })
            .catch(error => {
                resultDiv.innerHTML = `
                    <div class="result-message error">
                        <i class="fas fa-exclamation-triangle"></i>
                        <span>获取数据失败</span>
                    </div>
                `;
            });
        });

        let stocks = [];
        let selectedStockIndex = -1;

        const stockSearch = document.getElementById('stockSearch');
        const stockDropdown = document.getElementById('stockDropdown');
        const stockOptions = document.getElementById('stockOptions');
        const stockFileInput = document.getElementById('stockFile');

        function renderStockOptions(filter = '') {
            stockOptions.innerHTML = '';
            const filtered = stocks.filter(s => {
                const name = s.file.replace('.csv', '').toLowerCase();
                return name.includes(filter.toLowerCase());
            });

            if (filtered.length === 0) {
                stockOptions.innerHTML = '<div class="search-empty">没有找到匹配的股票</div>';
                return;
            }

            filtered.forEach((stock, index) => {
                const originalIndex = stocks.indexOf(stock);
                const div = document.createElement('div');
                div.className = 'search-option' + (originalIndex === selectedStockIndex ? ' selected' : '');

                let displayName = stock.file.replace('.csv', '');
                if (filter) {
                    const regex = new RegExp(`(${filter})`, 'gi');
                    displayName = displayName.replace(regex, '<mark>$1</mark>');
                }
                div.innerHTML = displayName;
                div.addEventListener('click', () => selectStock(originalIndex));
                stockOptions.appendChild(div);
            });
        }

        function selectStock(index) {
            if (index >= 0 && index < stocks.length) {
                selectedStockIndex = index;
                const stock = stocks[index];
                stockFileInput.value = stock.file;
                stockSearch.value = stock.file.replace('.csv', '');
                stockDropdown.classList.remove('show');
                renderStockOptions('');
            }
        }

        stockSearch.addEventListener('focus', () => {
            stockDropdown.classList.add('show');
            renderStockOptions(stockSearch.value);
        });

        stockSearch.addEventListener('input', (e) => {
            stockDropdown.classList.add('show');
            renderStockOptions(e.target.value);
        });

        document.addEventListener('click', (e) => {
            if (!document.getElementById('stockSelectWrapper').contains(e.target)) {
                stockDropdown.classList.remove('show');
            }
        });

        stockSearch.addEventListener('keydown', (e) => {
            const options = stockOptions.querySelectorAll('.search-option');
            if (options.length === 0) return;

            let currentIndex = -1;
            options.forEach((opt, i) => {
                if (opt.classList.contains('selected')) currentIndex = i;
            });

            if (e.key === 'ArrowDown') {
                e.preventDefault();
                currentIndex = currentIndex < options.length - 1 ? currentIndex + 1 : 0;
                options.forEach(opt => opt.classList.remove('selected'));
                options[currentIndex].classList.add('selected');
                options[currentIndex].scrollIntoView({ block: 'nearest' });
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                currentIndex = currentIndex > 0 ? currentIndex - 1 : options.length - 1;
                options.forEach(opt => opt.classList.remove('selected'));
                options[currentIndex].classList.add('selected');
                options[currentIndex].scrollIntoView({ block: 'nearest' });
            } else if (e.key === 'Enter' && currentIndex >= 0) {
                e.preventDefault();
                const filtered = stocks.filter(s => s.file.replace('.csv', '').toLowerCase().includes(stockSearch.value.toLowerCase()));
                if (filtered[currentIndex]) {
                    const originalIndex = stocks.indexOf(filtered[currentIndex]);
                    selectStock(originalIndex);
                }
            } else if (e.key === 'Escape') {
                stockDropdown.classList.remove('show');
            }
        });

        document.getElementById('dataSource').addEventListener('change', function() {
            const source = this.value;

            if (source) {
                fetch(`/get_stocks/${source}`)
                    .then(response => response.json())
                    .then(data => {
                        stocks = data.data.stocks || [];
                        selectedStockIndex = -1;
                        stockFileInput.value = '';
                        stockSearch.value = '';
                        stockSearch.placeholder = stocks.length > 0 ? '搜索股票...' : '暂无股票数据';
                        renderStockOptions();
                    });
            } else {
                stocks = [];
                selectedStockIndex = -1;
                stockFileInput.value = '';
                stockSearch.value = '';
                stockSearch.placeholder = '搜索股票...';
            }
        });

        document.querySelectorAll('input[name="backtestType"]').forEach(radio => {
            radio.addEventListener('change', updateStockSelectState);
        });

        function updateStockSelectState() {
            const isBatch = document.getElementById('batchTest').checked;
            if (isBatch) {
                stockSearch.disabled = true;
                stockSearch.placeholder = '批量模式无需选择';
                stockSearch.value = '';
                stockFileInput.value = '';
                stockDropdown.classList.remove('show');
            } else {
                stockSearch.disabled = false;
                stockSearch.placeholder = stocks.length > 0 ? '搜索股票...' : '暂无股票数据';
            }
        }

        document.getElementById('backtestForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const resultMessage = document.getElementById('resultMessage');
            const resultView = document.getElementById('resultView');

            resultMessage.innerHTML = `
                <div class="result-message info">
                    <i class="fas fa-spinner fa-spin"></i>
                    <span>回测正在进行中，请稍候...</span>
                </div>
            `;
            resultView.innerHTML = '';

            fetch('/run_backtest', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    source: document.getElementById('dataSource').value,
                    stock_file: document.getElementById('stockFile').value,
                    is_batch: document.getElementById('batchTest').checked,
                    init_cash: document.getElementById('initCash').value,
                    strategy: document.getElementById('strategy').value
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    resultMessage.innerHTML = `
                        <div class="result-message success">
                            <i class="fas fa-check-circle"></i>
                            <span>${data.message}</span>
                        </div>
                    `;
                    if (!document.getElementById('batchTest').checked && data.data.result_path) {
                        resultView.innerHTML = `
                            <a href="/show_result/${data.data.result_path}" target="_blank" class="view-btn">
                                <i class="fas fa-chart-line"></i> 查看回测结果
                            </a>
                        `;
                    }
                    loadResults(1);
                } else {
                    resultMessage.innerHTML = `
                        <div class="result-message error">
                            <i class="fas fa-times-circle"></i>
                            <span>${data.message}</span>
                        </div>
                    `;
                }
            })
            .catch(error => {
                resultMessage.innerHTML = `
                    <div class="result-message error">
                        <i class="fas fa-exclamation-triangle"></i>
                        <span>回测失败</span>
                    </div>
                `;
            });
        });

        let filterTimeout;

        function debounceFilter() {
            clearTimeout(filterTimeout);
            filterTimeout = setTimeout(applyFilters, 500);
        }

        function applyFilters() {
            loadResults(1);
        }

        function loadResults(page = 1) {
            const stockFilter = document.getElementById('stockFilter')?.value || '';
            const sourceFilter = document.getElementById('sourceFilter')?.value || '';
            const dateFilterStart = document.getElementById('dateFilterStart')?.value || '';
            const dateFilterEnd = document.getElementById('dateFilterEnd')?.value || '';
            const strategyFilter = document.getElementById('strategyFilter')?.value || '';

            const params = new URLSearchParams();
            params.append('page', page);
            params.append('page_size', pageSize);
            if (stockFilter) params.append('stock', stockFilter);
            if (sourceFilter) params.append('source', sourceFilter);
            if (strategyFilter) params.append('strategy', strategyFilter);
            if (dateFilterStart) params.append('date_start', dateFilterStart);
            if (dateFilterEnd) params.append('date_end', dateFilterEnd);

            fetch(`/get_backtest_results?${params.toString()}`)
                .then(response => response.json())
                .then(data => {
                    if (!data.success) return;

                    currentPage = page;
                    const resultsTable = document.getElementById('resultsTable');
                    const noResults = document.getElementById('noResults');
                    const paginationContainer = document.getElementById('paginationContainer');

                    resultsTable.innerHTML = '';
                    document.getElementById('resultCountValue').textContent = data.data.total || 0;

                    if (data.data.results.length > 0) {
                        noResults.classList.add('d-none');
                        paginationContainer.style.display = 'flex';

                        data.data.results.forEach((result, index) => {
                            const row = document.createElement('tr');
                            const serialNumber = (page - 1) * pageSize + index + 1;
                            row.innerHTML = `
                                <td class="text-secondary">#${serialNumber}</td>
                                <td><strong>${result.stock}</strong></td>
                                <td><span class="stock-badge">${result.source}</span></td>
                                <td>${result.strategy ? `<a href="/strategy_code?strategy=${encodeURIComponent(result.strategy)}" target="_blank" class="strategy-link">${result.strategy}</a>` : '-'}</td>
                                <td class="text-secondary">${result.run_time}</td>
                                <td><a href="/show_result/${result.path}" target="_blank" class="view-btn"><i class="fas fa-chart-line"></i> 查看</a></td>
                            `;
                            resultsTable.appendChild(row);
                        });

                        document.getElementById('totalResults').textContent = data.data.total;
                        renderPagination(page, data.data.total_pages);
                    } else {
                        noResults.classList.remove('d-none');
                        paginationContainer.style.display = 'none';
                        document.getElementById('totalResults').textContent = '0';
                    }
                });
        }

        function renderPagination(page, totalPages) {
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = '';

            document.getElementById('prevPage').className = `page-btn-custom ${page === 1 ? 'disabled' : ''}`;
            document.getElementById('nextPage').className = `page-btn-custom ${page === totalPages ? 'disabled' : ''}`;

            const maxButtons = 5;
            let startPage = Math.max(1, page - Math.floor(maxButtons / 2));
            let endPage = Math.min(totalPages, startPage + maxButtons - 1);

            if (endPage - startPage + 1 < maxButtons) {
                startPage = Math.max(1, endPage - maxButtons + 1);
            }

            for (let i = startPage; i <= endPage; i++) {
                const pageItem = document.createElement('button');
                pageItem.className = `page-btn-custom ${i === page ? 'active' : ''}`;
                pageItem.textContent = i;
                pageItem.addEventListener('click', () => goToPage(i));
                pagination.appendChild(pageItem);
            }
        }

        function goToPage(page) {
            const totalPages = parseInt(document.getElementById('totalResults').textContent) || 0;
            const totalPageCalc = Math.ceil(totalPages / pageSize);
            if (page >= 1 && page <= totalPageCalc) {
                loadResults(page);
            }
        }

        function resetFilters() {
            document.getElementById('stockFilter').value = '';
            document.getElementById('sourceFilter').value = '';
            document.getElementById('dateFilterStart').value = '';
            document.getElementById('dateFilterEnd').value = '';
            document.getElementById('strategyFilter').value = '';
            loadResults(1);
        }

        function showNotification(message, type = 'success') {
            const notification = document.getElementById('notification');
            const icon = type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle';
            notification.innerHTML = `
                <div class="toast-content ${type}">
                    <i class="fas ${icon} toast-icon"></i>
                    <span class="toast-message">${message}</span>
                </div>
            `;
            notification.className = `notification ${type} show`;
            
            clearTimeout(notification.hideTimeout);
            notification.hideTimeout = setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        window.addEventListener('load', () => loadResults(1));
    </script>
</body>
</html>
