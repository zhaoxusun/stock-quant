<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>背景音乐 - QuantX</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 320px;
            min-height: 420px;
            padding: var(--space-md);
            background: var(--bg-primary);
            font-family: var(--font-sans);
        }
        .music-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: var(--space-md);
            border-bottom: 1px solid var(--border-primary);
            margin-bottom: var(--space-md);
        }
        .music-header h3 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
        }
        .minimize-btn {
            padding: 4px 10px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-primary);
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-size: 0.75rem;
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        .minimize-btn:hover {
            background: var(--bg-elevated);
            color: var(--text-primary);
        }
        .music-info {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            margin-bottom: var(--space-lg);
        }
        .music-cover {
            width: 64px;
            height: 64px;
            background: var(--gradient-primary);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
        }
        .music-details {
            flex: 1;
            overflow: hidden;
        }
        .music-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .music-artist {
            font-size: 0.75rem;
            color: var(--text-tertiary);
            margin-top: 2px;
        }
        .progress-container {
            margin-bottom: var(--space-lg);
        }
        .progress-bar {
            height: 6px;
            background: var(--bg-tertiary);
            border-radius: var(--radius-full);
            cursor: pointer;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--gradient-primary);
            border-radius: var(--radius-full);
            width: 0%;
            transition: width 0.1s;
        }
        .progress-time {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: var(--text-tertiary);
            margin-top: 6px;
        }
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-lg);
            margin-bottom: var(--space-lg);
        }
        .control-btn {
            width: 40px;
            height: 40px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-primary);
            border-radius: 50%;
            color: var(--text-primary);
            cursor: pointer;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .control-btn:hover {
            background: var(--bg-elevated);
            border-color: var(--accent-primary);
        }
        .control-btn.play-pause {
            width: 50px;
            height: 50px;
            background: var(--gradient-primary);
            border: none;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.35);
        }
        .control-btn.play-pause:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.45);
        }
        .volume-container {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            margin-bottom: var(--space-lg);
            padding: 0 var(--space-sm);
        }
        .volume-icon {
            color: var(--text-tertiary);
            font-size: 0.9rem;
            cursor: pointer;
        }
        .volume-icon:hover {
            color: var(--accent-primary);
        }
        .volume-slider {
            flex: 1;
            height: 4px;
            background: var(--bg-tertiary);
            border-radius: var(--radius-full);
            cursor: pointer;
        }
        .volume-fill {
            height: 100%;
            background: var(--accent-primary);
            border-radius: var(--radius-full);
            width: 70%;
        }
        .playlist {
            background: var(--bg-card);
            border: 1px solid var(--border-primary);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }
        .playlist-title {
            padding: var(--space-sm) var(--space-md);
            background: var(--bg-tertiary);
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .playlist-items {
            max-height: 150px;
            overflow-y: auto;
        }
        .playlist-item {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            padding: 10px var(--space-md);
            cursor: pointer;
            transition: background var(--transition-fast);
            border-bottom: 1px solid var(--border-primary);
        }
        .playlist-item:last-child {
            border-bottom: none;
        }
        .playlist-item:hover {
            background: rgba(59, 130, 246, 0.1);
        }
        .playlist-item.active {
            background: rgba(59, 130, 246, 0.15);
        }
        .playlist-item.active .item-name {
            color: var(--accent-primary);
        }
        .item-icon {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-tertiary);
        }
        .playlist-item.active .item-icon {
            color: var(--accent-primary);
        }
        .sound-waves {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 14px;
        }
        .sound-wave {
            width: 3px;
            background: var(--text-tertiary);
            border-radius: 2px;
            animation: soundWave 1s ease-in-out infinite;
        }
        .sound-wave:nth-child(1) { height: 40%; animation-delay: 0s; }
        .sound-wave:nth-child(2) { height: 70%; animation-delay: 0.1s; }
        .sound-wave:nth-child(3) { height: 50%; animation-delay: 0.2s; }
        .sound-wave:nth-child(4) { height: 80%; animation-delay: 0.3s; }
        .playlist-item.active .sound-wave {
            background: var(--accent-primary);
        }
        @keyframes soundWave {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(0.5); }
        }
        .item-name {
            flex: 1;
            font-size: 0.8rem;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>
    <audio id="audioPlayer" loop preload="auto"></audio>

    <div class="music-header">
        <h3><i class="fas fa-music" style="color: var(--accent-primary); margin-right: 8px;"></i>背景音乐</h3>
        <button class="minimize-btn" onclick="window.close()">
            <i class="fas fa-minus"></i> 关闭
        </button>
    </div>

    <div class="music-info">
        <div class="music-cover"><i class="fas fa-music"></i></div>
        <div class="music-details">
            <div class="music-title" id="musicTitle">加载中...</div>
            <div class="music-artist">轻音乐</div>
        </div>
    </div>

    <div class="progress-container">
        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-time">
            <span id="currentTime">0:00</span>
            <span id="totalTime">0:00</span>
        </div>
    </div>

    <div class="controls">
        <button class="control-btn" id="prevBtn"><i class="fas fa-backward"></i></button>
        <button class="control-btn play-pause" id="playPauseBtn"><i class="fas fa-play"></i></button>
        <button class="control-btn" id="nextBtn"><i class="fas fa-forward"></i></button>
    </div>

    <div class="volume-container">
        <i class="fas fa-volume-down volume-icon" id="volDown"></i>
        <div class="volume-slider" id="volumeBar"><div class="volume-fill" id="volumeFill"></div></div>
        <i class="fas fa-volume-up volume-icon" id="volUp"></i>
    </div>

    <div class="playlist">
        <div class="playlist-title"><i class="fas fa-list"></i> 播放列表</div>
        <div class="playlist-items" id="playlistItems"></div>
    </div>

    <script>
        const audio = document.getElementById('audioPlayer');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const currentTimeEl = document.getElementById('currentTime');
        const totalTimeEl = document.getElementById('totalTime');
        const volumeBar = document.getElementById('volumeBar');
        const volumeFill = document.getElementById('volumeFill');
        const volDown = document.getElementById('volDown');
        const volUp = document.getElementById('volUp');
        const musicTitle = document.getElementById('musicTitle');
        const playlistItems = document.getElementById('playlistItems');

        let musicList = [];
        let currentIndex = 0;
        let isPlaying = false;
        let volume = 0.7;

        function init() {
            audio.volume = volume;
            updateVolumeUI();
            loadMusicList();
            bindEvents();
        }

        async function loadMusicList() {
            try {
                const res = await fetch('/api/music/list');
                const data = await res.json();
                if (data.success && data.data.music_list) {
                    musicList = data.data.music_list;
                    renderPlaylist();
                    loadTrack(0);
                }
            } catch (e) { console.error('加载失败:', e); }
        }

        function renderPlaylist() {
            playlistItems.innerHTML = '';
            musicList.forEach((t, i) => {
                const item = document.createElement('div');
                item.className = 'playlist-item' + (i === currentIndex ? ' active' : '');
                item.innerHTML = `<div class="item-icon"><div class="sound-waves"><div class="sound-wave"></div><div class="sound-wave"></div><div class="sound-wave"></div><div class="sound-wave"></div></div></div><div class="item-name">${t.name}</div>`;
                item.onclick = () => playTrack(i);
                playlistItems.appendChild(item);
            });
        }

        function loadTrack(index) {
            currentIndex = index;
            const track = musicList[index];
            audio.src = track.url;
            musicTitle.textContent = track.name;
            audio.currentTime = 0;
            renderPlaylist();
        }

        function playTrack(index) {
            loadTrack(index);
            play();
        }

        function play() {
            audio.play().then(() => {
                isPlaying = true;
                updateUI();
                notifyParent(true);
            }).catch(() => { isPlaying = false; updateUI(); });
        }

        function pause() {
            audio.pause();
            isPlaying = false;
            updateUI();
            notifyParent(false);
        }

        function updateUI() {
            playPauseBtn.querySelector('i').className = isPlaying ? 'fas fa-pause' : 'fas fa-play';
            renderPlaylist();
        }

        function updateProgress() {
            if (audio.duration) {
                progressFill.style.width = (audio.currentTime / audio.duration * 100) + '%';
                currentTimeEl.textContent = formatTime(audio.currentTime);
            }
        }

        function onMetadata() {
            totalTimeEl.textContent = formatTime(audio.duration);
        }

        function seek(e) {
            audio.currentTime = ((e.clientX - progressBar.getBoundingClientRect().left) / progressBar.offsetWidth) * audio.duration;
        }

        function setVolume(e) {
            volume = Math.max(0, Math.min(1, (e.clientX - volumeBar.getBoundingClientRect().left) / volumeBar.offsetWidth));
            audio.volume = volume;
            updateVolumeUI();
        }

        function updateVolumeUI() {
            volumeFill.style.width = volume * 100 + '%';
            const cls = volume === 0 ? 'fa-volume-mute' : (volume < 0.5 ? 'fa-volume-down' : 'fa-volume-up');
            volDown.className = volUp.className = `fas ${cls} volume-icon`;
        }

        function formatTime(s) {
            if (isNaN(s)) return '0:00';
            return `${Math.floor(s / 60)}:${Math.floor(s % 60).toString().padStart(2, '0')}`;
        }

        function notifyParent(playing) {
            if (window.opener) window.opener.postMessage({ type: 'musicState', isPlaying: playing }, '*');
            localStorage.setItem('musicIsPlaying', playing);
        }

        function bindEvents() {
            playPauseBtn.onclick = () => isPlaying ? pause() : play();
            document.getElementById('prevBtn').onclick = () => playTrack((currentIndex - 1 + musicList.length) % musicList.length);
            document.getElementById('nextBtn').onclick = () => playTrack((currentIndex + 1) % musicList.length);
            audio.onplay = () => { isPlaying = true; updateUI(); };
            audio.onpause = () => { isPlaying = false; updateUI(); };
            audio.ontimeupdate = updateProgress;
            audio.onloadedmetadata = onMetadata;
            audio.onended = () => playTrack((currentIndex + 1) % musicList.length);
            progressBar.onclick = seek;
            volumeBar.onclick = setVolume;
        }

        init();
    </script>
</body>
</html>
