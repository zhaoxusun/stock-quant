<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 股票分析助手 - QuantX</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤖</text></svg>" type="image/svg+xml">
</head>
<body>
    {% include 'navbar.html' %}

    <main class="main-content">
        <div class="container">
            <div class="page-header">
                <div class="page-header-content">
                    <h1 class="page-title">
                        <i class="fas fa-robot"></i>
                        AI 股票分析助手
                    </h1>
                    <p class="page-subtitle">智能对话，深度分析股票市场趋势与量化策略</p>
                </div>
            </div>

            <div class="chat-container">
                <div class="chat-header">
                    <h3 class="chat-title">
                        <i class="fas fa-brain"></i>
                        股票分析助手
                    </h3>
                    <select class="model-select" id="modelSelect">
                        <option value="gpt-4o-mini" selected>gpt-4o-mini</option>
                        <option value="gpt-4o">gpt-4o</option>
                        <option value="DeepSeek-R1">DeepSeek-R1</option>
                        <option value="DeepSeek-V3-0324">DeepSeek-V3-0324</option>
                        <option value="grok-3">grok-3</option>
                    </select>
                </div>
                <div class="chat-body" id="chatBody">
                    <div class="chat-message ai">
                        <div class="message-bubble">
                            <div>你好！我是股票分析助手，可以帮你分析股票市场数据、消息和趋势。请输入你的问题，例如：</div>
                            <ul style="margin-top: var(--space-sm);">
                                <li>分析近期科技股的走势</li>
                                <li>解读最新的宏观经济政策对股市的影响</li>
                                <li>分析某只股票的放量情况</li>
                                <li>对量化回测结果进行分析</li>
                            </ul>
                            <div class="message-time">系统</div>
                        </div>
                    </div>
                </div>
                <div class="chat-footer">
                    <form id="chatForm" class="chat-input-wrapper">
                        <input type="text" class="chat-input" id="promptInput" placeholder="输入你的问题，按 Enter 发送..." required>
                        <button type="submit" class="chat-send-btn" id="sendButton">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <div id="notification" class="notification"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const chatBody = document.getElementById('chatBody');
            const promptInput = document.getElementById('promptInput');
            const chatForm = document.getElementById('chatForm');
            const sendButton = document.getElementById('sendButton');
            const modelSelect = document.getElementById('modelSelect');

            let currentModel = 'gpt-4o-mini';

            modelSelect.addEventListener('change', function() {
                currentModel = this.value;
            });

            chatForm.addEventListener('submit', function(e) {
                e.preventDefault();

                const prompt = promptInput.value.trim();
                if (!prompt) return;

                addMessage('user', prompt);
                promptInput.value = '';

                sendButton.disabled = true;
                sendButton.innerHTML = '<div class="loading-spinner" style="width:20px;height:20px;border-width:2px;"></div>';

                const loadingMsg = addMessage('ai', '正在思考...');

                fetch('/api/ai-chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: currentModel, prompt: prompt })
                })
                .then(response => response.json())
                .then(data => {
                    removeMessage(loadingMsg);
                    if (data.success) {
                        addMessage('ai', data.data.response);
                    } else {
                        addMessage('ai', `错误: ${data.message}`);
                    }
                })
                .catch(error => {
                    removeMessage(loadingMsg);
                    addMessage('ai', `错误: 网络请求失败，请稍后重试`);
                })
                .finally(() => {
                    sendButton.disabled = false;
                    sendButton.innerHTML = '<i class="fas fa-paper-plane"></i>';
                });
            });

            function addMessage(type, content) {
                const messageDiv = document.createElement('div');
                messageDiv.className = `chat-message ${type}`;
                
                const bubble = document.createElement('div');
                bubble.className = 'message-bubble';
                bubble.innerHTML = `<div>${content}</div><div class="message-time">${new Date().toLocaleTimeString()}</div>`;
                
                messageDiv.appendChild(bubble);
                chatBody.appendChild(messageDiv);
                chatBody.scrollTop = chatBody.scrollHeight;
                
                return messageDiv;
            }

            function removeMessage(msgElement) {
                if (msgElement && msgElement.parentNode) {
                    msgElement.parentNode.removeChild(msgElement);
                }
            }

            promptInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    chatForm.dispatchEvent(new Event('submit'));
                }
            });
        });
    </script>
</body>
</html>
