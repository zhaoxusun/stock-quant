<script>
    let musicWindow = null;

    function openMusicPlayer() {
        if (musicWindow && !musicWindow.closed) {
            musicWindow.focus();
            return;
        }

        musicWindow = window.open(
            '/music_player',
            'musicPlayer',
            'width=340,height=420,menubar=no,toolbar=no,location=no,status=no,scrollbars=no'
        );

        if (musicWindow) {
            musicWindow.focus();
        }
    }

    document.getElementById('musicToggleBtn').addEventListener('click', openMusicPlayer);

    function updateMusicBtn(playing) {
        const btn = document.getElementById('musicToggleBtn');
        if (playing) {
            btn.classList.add('playing');
        } else {
            btn.classList.remove('playing');
        }
    }

    function syncMusicState() {
        const isPlaying = localStorage.getItem('musicIsPlaying') === 'true';
        updateMusicBtn(isPlaying);

        setInterval(() => {
            const currentPlaying = localStorage.getItem('musicIsPlaying') === 'true';
            updateMusicBtn(currentPlaying);
        }, 1000);
    }

    window.addEventListener('message', (e) => {
        if (e.data.type === 'musicState') {
            updateMusicBtn(e.data.isPlaying);
        }
    });

    window.addEventListener('storage', (e) => {
        if (e.key === 'musicIsPlaying') {
            updateMusicBtn(e.newValue === 'true');
        }
    });

    syncMusicState();
</script>
