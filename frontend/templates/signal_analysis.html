<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>信号分析 - QuantX</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📈</text></svg>" type="image/svg+xml">
</head>
<body>
    {% include 'navbar.html' %}

    <main class="main-content">
        <div class="container">
            <div class="page-header">
                <div class="page-header-content">
                    <h1 class="page-title">
                        <i class="fas fa-bolt"></i>
                        信号分析
                    </h1>
                    <p class="page-subtitle">深度分析交易信号，挖掘市场规律与投资机会</p>
                </div>
            </div>

            <div class="filter-bar">
                <div class="filter-group">
                    <label><i class="fas fa-brain"></i></label>
                    <select class="filter-select" id="strategyFilter">
                        <option value="">策略</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label><i class="fas fa-search"></i></label>
                    <input type="text" class="filter-input" id="stockFilter" placeholder="股票代码或名称">
                </div>
                <div class="filter-group">
                    <label><i class="fas fa-rocket"></i></label>
                    <select class="filter-select" id="modeFilter">
                        <option value="">模式</option>
                        <option value="LIVE">实盘</option>
                        <option value="BACKTEST">回测</option>
                    </select>
                </div>
                <div class="filter-group date-range">
                    <label><i class="fas fa-clock"></i></label>
                    <input type="date" class="filter-input" id="fileCreateStartDate">
                    <span style="color: var(--text-tertiary);">至</span>
                    <input type="date" class="filter-input" id="fileCreateEndDate">
                </div>
                <button class="filter-btn reset" onclick="resetSignalFilters()">
                    <i class="fas fa-undo"></i> 重置
                </button>
            </div>

            <div class="card" style="margin-bottom: var(--space-lg);">
                <div class="card-header">
                    <h3 class="card-header-title">
                        <i class="fas fa-file-alt"></i>
                        信号文件
                    </h3>
                    <div style="display: flex; align-items: center; gap: var(--space-md);">
                        <span class="text-secondary">|</span>
                        <span>已筛选 <strong id="filteredFileCount" style="color: var(--accent-success);">0</strong> 条</span>
                        <span class="text-secondary">|</span>
                        <span>已勾选 <strong id="selectedFileCount" style="color: var(--accent-primary);">0</strong> 条</span>
                    </div>
                </div>
                <div class="card-body" style="padding: 0;">
                    <div class="signal-files-list" id="signalFilesContainer" style="max-height: 350px;">
                        <div class="signal-files-empty">
                            <i class="fas fa-spinner fa-spin"></i>
                            <p>加载信号文件中...</p>
                        </div>
                    </div>
                </div>
                <div class="signal-files-stats">
                    <div style="display: flex; align-items: center; gap: var(--space-lg); flex-wrap: wrap;">
                        <div class="filter-item-inline">
                            <span class="filter-label">信号类型：</span>
                            <select class="form-select form-select-sm" id="signalTypeFilter" style="width: auto; min-width: 120px;">
                                <option value="">全部类型</option>
                            </select>
                        </div>
                        <div class="filter-item-inline">
                            <span class="filter-label">筛选信号时间区间：</span>
                            <input type="date" class="form-input" id="startDate" style="padding: 6px 10px; font-size: 0.85rem; width: auto;">
                            <span class="text-muted mx-1">至</span>
                            <input type="date" class="form-input" id="endDate" style="padding: 6px 10px; font-size: 0.85rem; width: auto;">
                        </div>
                    </div>
                    <button class="btn btn-primary" onclick="analyzeSelectedSignals()">
                        <i class="fas fa-chart-bar"></i> 分析信号
                    </button>
                </div>
            </div>

            <div id="analysisSummaryCard" class="card d-none">
                <div class="card-header">
                    <h3 class="card-header-title">
                        <i class="fas fa-chart-pie"></i>
                        分析摘要
                    </h3>
                    <button id="downloadHtmlBtn" class="btn btn-sm d-none" style="background: var(--gradient-primary); color: white;">
                        <i class="fas fa-download"></i> 下载报告
                    </button>
                </div>
                <div class="card-body">
                    <div class="stats-grid">
                        <div class="stat-card primary">
                            <div class="stat-card-icon"><i class="fas fa-list"></i></div>
                            <div class="stat-card-label">总信号数</div>
                            <div class="stat-card-value" id="totalSignals">0</div>
                        </div>
                        <div class="stat-card success">
                            <div class="stat-card-icon"><i class="fas fa-arrow-up"></i></div>
                            <div class="stat-card-label">买入信号</div>
                            <div class="stat-card-value" id="buySignals">0</div>
                        </div>
                        <div class="stat-card danger">
                            <div class="stat-card-icon"><i class="fas fa-arrow-down"></i></div>
                            <div class="stat-card-label">卖出信号</div>
                            <div class="stat-card-value" id="sellSignals">0</div>
                        </div>
                        <div class="stat-card info">
                            <div class="stat-card-icon"><i class="fas fa-chart-bar"></i></div>
                            <div class="stat-card-label">股票数</div>
                            <div class="stat-card-value" id="uniqueStocks">0</div>
                        </div>
                        <div class="stat-card purple">
                            <div class="stat-card-icon"><i class="fas fa-brain"></i></div>
                            <div class="stat-card-label">策略数</div>
                            <div class="stat-card-value" id="uniqueStrategies">0</div>
                        </div>
                        <div class="stat-card info">
                            <div class="stat-card-icon"><i class="fas fa-database"></i></div>
                            <div class="stat-card-label">数据源数</div>
                            <div class="stat-card-value" id="uniqueSources">0</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-card-icon"><i class="fas fa-rocket"></i></div>
                            <div class="stat-card-label">运行模式</div>
                            <div class="stat-card-value" id="uniqueModes">-</div>
                        </div>
                    </div>
                    <div style="background: var(--bg-tertiary); padding: var(--space-md); border-radius: var(--radius-lg); margin-top: var(--space-lg);">
                        <div style="display: flex; align-items: center; gap: var(--space-sm); color: var(--text-secondary);">
                            <i class="fas fa-calendar-alt" style="color: var(--accent-primary);"></i>
                            <span>信号时间范围：<strong id="dateRange" style="color: var(--text-primary);">-</strong></span>
                        </div>
                    </div>
                    <div style="margin-top: var(--space-lg);">
                        <h5 style="color: var(--text-primary); margin-bottom: var(--space-md); display: flex; align-items: center; gap: var(--space-sm);">
                            <i class="fas fa-chart-pie" style="color: var(--accent-primary);"></i>
                            信号类型分布
                        </h5>
                        <div class="distribution-bars" id="distributionBars"></div>
                    </div>
                </div>
            </div>

            <div id="analysisResultCard" class="card d-none">
                <div class="card-header">
                    <h3 class="card-header-title">
                        <i class="fas fa-table"></i>
                        信号分析结果
                    </h3>
                </div>
                <div class="card-body" style="padding: 0;">
                    <div class="table-container" style="border: none; border-radius: 0;">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>日期</th>
                                    <th>信号类型</th>
                                    <th>描述</th>
                                    <th>股票信息</th>
                                    <th>数据源</th>
                                    <th>策略</th>
                                </tr>
                            </thead>
                            <tbody id="signalsTable"></tbody>
                        </table>
                    </div>

                    <div class="pagination">
                        <div class="pagination-info">
                            共 <strong id="totalSignalResults">0</strong> 条记录
                        </div>
                        <div class="pagination-controls">
                            <button class="page-btn" id="prevPageBtn" onclick="changePage(-1)">
                                <i class="fas fa-chevron-left"></i>
                            </button>
                            <div id="pagination" style="display: flex; gap: 4px;"></div>
                            <button class="page-btn" id="nextPageBtn" onclick="changePage(1)">
                                <i class="fas fa-chevron-right"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="notification" class="notification"></div>

    <script>
        let allSignalFiles = [];
        let filteredSignalFiles = [];
        let allSignalsData = [];
        let currentSummary = {};
        const pageSize = 20;
        let currentPage = 1;

        document.addEventListener('DOMContentLoaded', function() {
            const today = new Date();
            const twoWeeksAgo = new Date(today);
            twoWeeksAgo.setDate(today.getDate() - 14);

            document.getElementById('startDate').value = twoWeeksAgo.toISOString().split('T')[0];
            document.getElementById('endDate').value = today.toISOString().split('T')[0];

            loadSignalFiles();
            initDateInputs();
        });

        function initDateInputs() {
            document.querySelectorAll('input[type="date"]').forEach(input => {
                input.style.cursor = 'pointer';
                input.addEventListener('click', function(e) {
                    e.stopPropagation();
                    if (this.showPicker) {
                        this.showPicker();
                    } else {
                        this.focus();
                    }
                });
            });
        }

        function loadSignalFiles() {
            fetch('/api/backtest_records/get_all')
                .then(r => r.json())
                .then(data => {
                    if (data.success && data.data) {
                        allSignalFiles = data.data.map(r => ({
                            file_path: r.record_id,
                            data_source: r.init_data?.data_source || '',
                            stock_info: r.init_data?.stock_name || r.init_data?.stock_code || '',
                            strategy_name: r.init_data?.strategy || '',
                            backtest_mode: r.init_data?.backtest_mode || 'BACKTEST',
                            file_time: r.created_at ? r.created_at.substring(0, 10) : ''
                        }));
                        filteredSignalFiles = [...allSignalFiles];
                        renderSignalFiles(filteredSignalFiles);
                        loadSignalMetadata();
                    }
                });
        }

        function loadSignalMetadata() {
            const strategies = new Set();
            const signalTypes = new Set(['normal_buy', 'strong_buy', 'normal_sell', 'strong_sell']);

            allSignalFiles.forEach(f => {
                if (f.strategy_name) strategies.add(f.strategy_name);
            });

            const strategySelect = document.getElementById('strategyFilter');
            [...strategies].sort().forEach(s => {
                const opt = document.createElement('option');
                opt.value = s;
                opt.textContent = s;
                strategySelect.appendChild(opt);
            });

            const signalTypeSelect = document.getElementById('signalTypeFilter');
            [...signalTypes].sort().forEach(t => {
                const opt = document.createElement('option');
                opt.value = t;
                opt.textContent = t;
                signalTypeSelect.appendChild(opt);
            });

            document.getElementById('strategyFilter').addEventListener('change', filterSignalFiles);
            document.getElementById('stockFilter').addEventListener('input', debounce(filterSignalFiles, 300));
            document.getElementById('modeFilter').addEventListener('change', filterSignalFiles);
            document.getElementById('signalTypeFilter').addEventListener('change', filterSignalFiles);
            document.getElementById('fileCreateStartDate').addEventListener('change', filterSignalFiles);
            document.getElementById('fileCreateEndDate').addEventListener('change', filterSignalFiles);
        }

        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        function filterSignalFiles() {
            const strategy = document.getElementById('strategyFilter').value;
            const stock = document.getElementById('stockFilter').value;
            const fileCreateStart = document.getElementById('fileCreateStartDate').value;
            const fileCreateEnd = document.getElementById('fileCreateEndDate').value;
            const mode = document.getElementById('modeFilter').value;

            filteredSignalFiles = allSignalFiles.filter(f => {
                if (strategy && !f.strategy_name.includes(strategy)) return false;
                if (stock && !f.stock_info.toLowerCase().includes(stock.toLowerCase())) return false;
                if (fileCreateStart && f.file_time < fileCreateStart) return false;
                if (fileCreateEnd && f.file_time > fileCreateEnd) return false;
                if (mode && f.backtest_mode !== mode) return false;
                return true;
            });

            renderSignalFiles(filteredSignalFiles);
        }

        function renderSignalFiles(files) {
            const container = document.getElementById('signalFilesContainer');
            document.getElementById('filteredFileCount').textContent = files.length;

            if (files.length === 0) {
                container.innerHTML = `
                    <div class="signal-files-empty">
                        <i class="fas fa-search"></i>
                        <p>没有找到匹配的信号文件</p>
                        <small>尝试调整筛选条件</small>
                    </div>
                `;
                document.getElementById('selectedFileCount').textContent = '0';
                return;
            }

            container.innerHTML = files.map(f => {
                const modeLabel = f.backtest_mode === 'LIVE'
                    ? '<span class="badge badge-warning">实盘</span>'
                    : '<span class="badge badge-primary">回测</span>';
                return `
                    <div class="signal-file-item">
                        <input type="checkbox" name="signalFile" value="${f.file_path}" checked onchange="updateFileCount()">
                        <div class="signal-file-content">
                            <div class="signal-file-info">
                                <span class="signal-file-source">${f.data_source}</span>
                                <i class="fas fa-chevron-right text-muted mx-2"></i>
                                <span class="signal-file-stock">${f.stock_info}</span>
                                <i class="fas fa-chevron-right text-muted mx-2"></i>
                                <span class="signal-file-strategy">${f.strategy_name}</span>
                                <i class="fas fa-chevron-right text-muted mx-2"></i>
                                <span class="signal-file-mode">${modeLabel}</span>
                                <i class="fas fa-clock text-muted mx-2"></i>
                                <span class="signal-file-time">${f.file_time}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            updateFileCount();
        }

        function updateFileCount() {
            const allCheckboxes = document.querySelectorAll('input[name="signalFile"]');
            const checked = Array.from(allCheckboxes).filter(cb => cb.checked).length;
            document.getElementById('selectedFileCount').textContent = checked;
        }

        function resetSignalFilters() {
            document.getElementById('strategyFilter').value = '';
            document.getElementById('stockFilter').value = '';
            document.getElementById('fileCreateStartDate').value = '';
            document.getElementById('fileCreateEndDate').value = '';
            document.getElementById('modeFilter').value = '';
            filteredSignalFiles = [...allSignalFiles];
            renderSignalFiles(filteredSignalFiles);
        }

        function analyzeSelectedSignals() {
            const selectedFiles = Array.from(document.querySelectorAll('input[name="signalFile"]:checked')).map(cb => cb.value);
            if (selectedFiles.length === 0) {
                showNotification('请至少选择一个信号文件', 'error');
                return;
            }

            const filters = {
                strategy_name: document.getElementById('strategyFilter').value,
                stock_code: document.getElementById('stockFilter').value,
                signal_type: document.getElementById('signalTypeFilter').value,
                start_date: document.getElementById('startDate').value,
                end_date: document.getElementById('endDate').value
            };

            document.getElementById('analysisSummaryCard').classList.remove('d-none');
            document.getElementById('signalsTable').innerHTML = '<tr><td colspan="6" class="text-center py-5"><div class="loading-spinner mx-auto"></div></td></tr>';

            fetch('/analyze_signals', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ record_ids: selectedFiles, filters })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success && data.data) {
                    const summary = data.data.summary;
                    currentSummary = summary;
                    document.getElementById('totalSignals').textContent = summary.total_signals;
                    document.getElementById('buySignals').textContent = summary.buy_signals;
                    document.getElementById('sellSignals').textContent = summary.sell_signals;
                    document.getElementById('uniqueStocks').textContent = summary.unique_stocks;
                    document.getElementById('uniqueStrategies').textContent = summary.unique_strategies;
                    document.getElementById('uniqueSources').textContent = summary.unique_sources || 0;
                    document.getElementById('uniqueModes').textContent = summary.unique_modes || '-';
                    document.getElementById('dateRange').textContent = summary.date_range || '-';
                    document.getElementById('downloadHtmlBtn').classList.remove('d-none');
                    document.getElementById('downloadHtmlBtn').onclick = downloadResultsAsHTML;

                    renderSignalDistribution(summary.signal_type_counts, summary.total_signals);

                    allSignalsData = data.data.signals;
                    currentPage = 1;
                    renderPageData();
                    document.getElementById('totalSignalResults').textContent = summary.total_signals;
                    document.getElementById('analysisResultCard').classList.remove('d-none');
                    showNotification(`分析完成，共找到 ${summary.total_signals} 条信号`);
                } else {
                    showNotification(data.message || '分析失败', 'error');
                }
            });
        }

        function renderPageData() {
            const start = (currentPage - 1) * pageSize;
            const end = start + pageSize;
            const pageData = allSignalsData.slice(start, end);
            renderTable(pageData, start);
            updatePagination();
        }

        function renderTable(data, startIndex) {
            const tbody = document.getElementById('signalsTable');
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">暂无数据</td></tr>';
                return;
            }

            const typeColors = {
                'normal_buy': 'color: var(--accent-success);',
                'strong_buy': 'color: #059669;',
                'normal_sell': 'color: var(--accent-danger);',
                'strong_sell': 'color: #dc2626;'
            };

            tbody.innerHTML = data.map((s, i) => `
                <tr>
                    <td>${s.date || '-'}</td>
                    <td style="${typeColors[s.signal_type] || ''}">${s.signal_type || '-'}</td>
                    <td>${s.description || '-'}</td>
                    <td>${s.stock_info || '-'}</td>
                    <td>${s.data_source || '-'}</td>
                    <td>${s.strategy_name || '-'}</td>
                </tr>
            `).join('');
        }

        function updatePagination() {
            const totalPages = Math.ceil(allSignalsData.length / pageSize) || 1;
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = '';

            for (let i = 1; i <= totalPages; i++) {
                const pageItem = document.createElement('button');
                pageItem.className = `page-btn ${i === currentPage ? 'active' : ''}`;
                pageItem.textContent = i;
                pageItem.onclick = () => {
                    currentPage = i;
                    renderPageData();
                };
                pagination.appendChild(pageItem);
            }

            document.getElementById('prevPageBtn').classList.toggle('disabled', currentPage === 1);
            document.getElementById('nextPageBtn').classList.toggle('disabled', currentPage === totalPages);
        }

        function changePage(delta) {
            const totalPages = Math.ceil(allSignalsData.length / pageSize) || 1;
            const newPage = currentPage + delta;
            if (newPage >= 1 && newPage <= totalPages) {
                currentPage = newPage;
                renderPageData();
            }
        }

        function renderSignalDistribution(typeCounts, total) {
            const container = document.getElementById('distributionBars');
            const typeColors = {
                '普通买入': '#10b981',
                '强势买入': '#059669',
                '普通卖出': '#ef4444',
                '强势卖出': '#dc2626',
            };

            container.innerHTML = '';

            const entries = Object.entries(typeCounts).sort((a, b) => b[1] - a[1]);
            entries.forEach(([type, count]) => {
                const percentage = total > 0 ? (count / total * 100).toFixed(1) : 0;
                const color = typeColors[type] || '#3b82f6';

                const bar = document.createElement('div');
                bar.className = 'distribution-bar';
                bar.innerHTML = `
                    <div class="bar-label">
                        <span class="bar-name">${type}</span>
                        <span class="bar-count">${count} 条</span>
                    </div>
                    <div class="bar-track">
                        <div class="bar-fill" style="width: ${percentage}%; background: ${color};"></div>
                    </div>
                    <div class="bar-percent">${percentage}%</div>
                `;
                container.appendChild(bar);
            });
        }

        function downloadResultsAsHTML() {
            if (!allSignalsData.length) {
                showNotification('没有可下载的数据', 'error');
                return;
            }

            const filters = {
                strategy_name: document.getElementById('strategyFilter').value,
                stock_code: document.getElementById('stockFilter').value,
                signal_type: document.getElementById('signalTypeFilter').value,
                mode: document.getElementById('modeFilter').value,
                start_date: document.getElementById('startDate').value,
                end_date: document.getElementById('endDate').value,
                date_start: document.getElementById('fileCreateStartDate').value,
                date_end: document.getElementById('fileCreateEndDate').value
            };

            const summary = { ...currentSummary };

            fetch('/generate_html_report', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ signals_data: allSignalsData, filters, summary })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    const blob = new Blob([data.data.html_content], { type: 'text/html' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = data.data.file_name;
                    a.click();
                    URL.revokeObjectURL(url);
                    showNotification('报告下载成功');
                } else {
                    showNotification(data.message || '报告生成失败', 'error');
                }
            });
        }

        function showNotification(message, type = 'success') {
            const notification = document.getElementById('notification');
            notification.innerHTML = `
                <div class="toast-content ${type}">
                    <i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'} toast-icon"></i>
                    <span class="toast-message">${message}</span>
                </div>
            `;
            notification.className = `notification ${type} show`;
            clearTimeout(notification.hideTimeout);
            notification.hideTimeout = setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
